# configs/paths.yaml
external_data_root: /data/data_raw
edaic:
  root: ${external_data_root}/eDAIC
  labels: ${edaic.root}/labels
  features:
    openface: ${edaic.root}/features/OpenFace2.1.0_Pose_gaze_AUs
    egemaps:  ${edaic.root}/features/OpenSMILE2.3.0_egemaps
    vgg16:    ${edaic.root}/features/vgg16
daic:
  root: ${external_data_root}/DAIC_WOZ
  transcripts: ${daic.root}/TRANSCRIPTS
