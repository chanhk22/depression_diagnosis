dvlog:
  root: ${external_data_root}/DVLOG
  acoustic_npy: ${dvlog.root}/acoustic.npy
  visual_npy:   ${dvlog.root}/visual.npy
cache_root: /data/cache   # 윈도 캐시 저장 경로
